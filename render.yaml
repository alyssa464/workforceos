services:
  - type: web
    name: workforceos-api
    runtime: python
    repo: https://github.com/alyssa464/workforceos
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0